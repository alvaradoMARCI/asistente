name: Build Dayana APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create secrets.properties
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> secrets.properties
          echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" >> secrets.properties
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> secrets.properties

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --warning-mode all

      - name: Rename Debug APK
        run: |
          mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/dayana-v4-debug.apk

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: dayana-v4-debug-apk
          path: app/build/outputs/apk/debug/dayana-v4-debug.apk

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --warning-mode all
        continue-on-error: true

      - name: Rename Release APK
        if: always()
        run: |
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/dayana-v4-release.apk
          elif [ -f app/build/outputs/apk/release/app-release-unsigned.apk ]; then
            mv app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/release/dayana-v4-release-unsigned.apk
          fi

      - name: Upload Release APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dayana-v4-release-apk
          path: |
            app/build/outputs/apk/release/dayana-v4-release.apk
            app/build/outputs/apk/release/dayana-v4-release-unsigned.apk

      - name: Generate tag name
        id: tag
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "tag_name=dayana-v4.3-build-${TIMESTAMP}-${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag_name }}
          name: "Dayana v4.3 - Voz + Descarga de Modelos Vosk"
          body: |
            ## Dayana v4.3 - Asistente con Voz + Descarga Automática de Modelos

            ### Novedades en v4.3 - Descarga de Modelos Vosk
            - **VoskModelDownloader**: Descarga automática de modelos de voz desde la app
            - **Modelo small (50MB)**: Para detección de wake word
            - **Modelo full (1.3GB)**: Para transcripción de comandos
            - **UI de progreso**: Barra de descarga + notificación persistente
            - **Reinicio automático**: Al completar descarga, servicios se inician solos
            - **Compatible Android 14**: `startForeground()` con ServiceInfo y PROPERTY_SPECIAL_USE_FGS_SUBTYPE

            ### Novedades en v4.2 - Sistema de Voz
            - **Android TTS nativo**: Voz offline 100% funcional sin internet
            - **6 personas con voz única**: HESTIA, METIS, ARGUS, ATHENA, SELENE, IRIS
            - **3 modos de voz**: OFFLINE (Android TTS), CLOUD (OpenAI/ElevenLabs), AUTO
            - **Pipeline interconectado**: VoiceCommandOrchestrator + AgentThought events

            ### Sistema de Fallback Multi-API
            - Gemini → Groq → OpenAI (automático)
            - 3 API keys preconfiguradas y encriptadas (AES-256-GCM)
            - Wake words: "Hey Dayana", "Hey Marcia", "Hey Nubia"
          draft: false
          prerelease: false
          files: |
            app/build/outputs/apk/debug/dayana-v4-debug.apk
            app/build/outputs/apk/release/dayana-v4-release.apk
            app/build/outputs/apk/release/dayana-v4-release-unsigned.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
