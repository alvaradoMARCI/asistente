name: Build Dayana APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create secrets.properties
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> secrets.properties
          echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" >> secrets.properties
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> secrets.properties

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --warning-mode all

      - name: Rename Debug APK
        run: |
          mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/dayana-v4-debug.apk

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: dayana-v4-debug-apk
          path: app/build/outputs/apk/debug/dayana-v4-debug.apk

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --warning-mode all
        continue-on-error: true

      - name: Rename Release APK
        if: always()
        run: |
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/dayana-v4-release.apk
          elif [ -f app/build/outputs/apk/release/app-release-unsigned.apk ]; then
            mv app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/release/dayana-v4-release-unsigned.apk
          fi

      - name: Upload Release APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dayana-v4-release-apk
          path: |
            app/build/outputs/apk/release/dayana-v4-release.apk
            app/build/outputs/apk/release/dayana-v4-release-unsigned.apk

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dayana-v4.2-voice
          name: "Dayana v4.2 - Voz Funcional + Fallback Multi-API"
          body: |
            ## Dayana v4.2 - Asistente con Voz Funcional

            ### Novedades en v4.2 - Sistema de Voz
            - **Android TTS nativo**: Voz offline 100% funcional sin internet
            - **6 personas con voz única**: HESTIA, METIS, ARGUS, ATHENA, SELENE, IRIS
            - **Parámetros por persona**: pitch, velocidad, voz OpenAI, voz ElevenLabs
            - **Auto-speak**: Dayana habla automáticamente al responder
            - **3 modos de voz**: OFFLINE (Android TTS), CLOUD (OpenAI/ElevenLabs), AUTO
            - **MediaPlayer para cloud TTS**: Reproducción MP3 correcta
            - **Arquitectura Piper-ready**: Preparado para Piper ONNX futuro

            ### Sistema de Fallback Multi-API
            - Gemini → Groq → OpenAI (automático)
            - 3 API keys preconfiguradas y encriptadas (AES-256-GCM)
            - Wake words: "Hey Dayana", "Hey Marcia", "Hey Nubia"

            ### Proveedores de Voz
            | Proveedor | Tipo | Requiere Internet | Calidad |
            |-----------|------|-------------------|---------|
            | Android TTS | Offline | No | Media-Alta |
            | OpenAI TTS | Cloud | Si | Alta |
            | ElevenLabs | Cloud | Si | Muy Alta |
            | Piper ONNX | Offline | No | Media (futuro) |
          draft: false
          prerelease: false
          files: |
            app/build/outputs/apk/debug/dayana-v4-debug.apk
            app/build/outputs/apk/release/dayana-v4-release.apk
            app/build/outputs/apk/release/dayana-v4-release-unsigned.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
